version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: yggdrasil_postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: yggdrasil_ml
      POSTGRES_USER: yggdrasil_user
      POSTGRES_PASSWORD: yggdrasil_password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./sql/seed_data.sql:/docker-entrypoint-initdb.d/02_seed_data.sql
      - ./sql/seed_circuits.sql:/docker-entrypoint-initdb.d/03_seed_circuits.sql

volumes:
  postgres_data: